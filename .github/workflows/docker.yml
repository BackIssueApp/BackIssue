# Build the BackIssue Docker image and publish it to GitHub Container Registry.
#   docker pull ghcr.io/backissueapp/backissue:latest
# Release tags (v*) → clean semver tags (e.g. 1.2.0, 1.2) plus 'latest' — the
# ONLY thing that moves 'latest'. The nightly schedule refreshes ':nightly';
# every push to main builds a rolling ':dev' image of the current tree, for
# testing changes without cutting a version.
#
# Two variants are built from the same context:
#   - lean    (Dockerfile)          → :latest, :X.Y.Z, :dev, :nightly, …
#   - browser (Dockerfile.browser)  → the same tags with a '-browser' suffix
#     (e.g. :latest-browser). Bundles Chromium + Xvfb (~1GB) for plugins/addons
#     that drive a real browser (Cloudflare-walled sources).
name: Docker image

on:
  push:
    branches: [main]  # → :dev (rolling)
    tags: ['v*']      # → semver + latest
  schedule:
    - cron: '0 6 * * *'  # nightly build of main → :nightly only
  workflow_dispatch:     # → :dev (manual validation build)

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: lean
            dockerfile: Dockerfile
            flavor: ""
          - variant: browser
            dockerfile: Dockerfile.browser
            flavor: suffix=-browser,onlatest=true
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/backissueapp/backissue
          # Browser variant appends '-browser' to every tag (incl. latest).
          flavor: ${{ matrix.flavor }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=schedule,pattern=nightly
            # 'latest' only on release tags — nightly stays on :nightly.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # rolling dev image: every push to main, and manual dispatch runs
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp non-release builds so the app reports e.g. "0.5.0-dev.a1b2c3d"
          # (release tags keep the clean version).
          build-args: |
            BUILD_CHANNEL=${{ startsWith(github.ref, 'refs/tags/v') && 'release' || (github.event_name == 'schedule' && 'nightly' || 'dev') }}
            BUILD_SHA=${{ github.sha }}
          # Separate cache scope per variant so the two Dockerfiles don't thrash.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
