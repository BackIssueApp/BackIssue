# Build the BackIssue Docker image and publish it to GitHub Container Registry.
#   docker pull ghcr.io/backissueapp/backissue:latest
# Release tags (v*) → clean semver tags (e.g. 1.2.0, 1.2) plus 'latest' — the
# ONLY thing that moves 'latest'. The nightly schedule refreshes ':nightly';
# every push to main builds a rolling ':dev' image of the current tree, for
# testing changes without cutting a version.
name: Docker image

on:
  push:
    branches: [main]  # → :dev (rolling)
    tags: ['v*']      # → semver + latest
  schedule:
    - cron: '0 6 * * *'  # nightly build of main → :nightly only
  workflow_dispatch:     # → :dev (manual validation build)

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/backissueapp/backissue
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=schedule,pattern=nightly
            # 'latest' only on release tags — nightly stays on :nightly.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # rolling dev image: every push to main, and manual dispatch runs
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
