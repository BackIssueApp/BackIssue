# Build the BackIssue Docker image and publish it to GitHub Container Registry.
#   docker pull ghcr.io/backissueapp/backissue:latest
# Builds happen on release tags (v*) → clean semver tags (e.g. 1.2.0, 1.2) plus
# 'latest', and on a nightly schedule → ':nightly' (also refreshing 'latest'),
# so self-hosters stay current without a build on every commit.
name: Docker image

on:
  push:
    tags: ['v*']
  schedule:
    - cron: '0 6 * * *'  # nightly build of main → :nightly (+ latest)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/backissueapp/backissue
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=schedule,pattern=nightly
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
