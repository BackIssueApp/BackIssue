# Run the test suite on every pull request and push to main — the check that
# branch protection requires before a PR can merge.
name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Build the UI FIRST — the server serves frontend/dist (gitignored), and
      # shell-serving tests assert against it.
      # Drop the committed lockfile first: generated on Windows, it omits this
      # platform's native bundler binding (npm/cli#4828) — same as the Dockerfile.
      - run: rm -f frontend/package-lock.json && npm install --prefix frontend && npm run build --prefix frontend
      - run: npm test
